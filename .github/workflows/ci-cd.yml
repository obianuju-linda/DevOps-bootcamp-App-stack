name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: obianuju127/devopsbootcamp

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Security Scan with Trivy
  # ─────────────────────────────────────────
  trivy-scan:
    name: 🔍 Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Scan frontend source
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./devops-bootcamp-linker-frontend
          severity: CRITICAL
          exit-code: 1
          format: table

      - name: Scan backend source
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./devops-bootcamp-linker-backend
          severity: CRITICAL
          exit-code: 1
          format: table

  # ─────────────────────────────────────────
  # JOB 2: Build & Push Frontend Image
  # ─────────────────────────────────────────
  build-frontend:
    name: 🐳 Build & Push Frontend
    runs-on: ubuntu-latest
    needs: trivy-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Login to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build frontend image
        run: |
          docker build \
            -t $IMAGE_NAME:frontend-test-v${{ github.run_number }} \
            -t $IMAGE_NAME:frontend-latest \
            ./devops-bootcamp-linker-frontend

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:frontend-test-v${{ github.run_number }}
          severity: CRITICAL
          exit-code: 1
          format: table

      - name: Push frontend image
        run: |
          docker push $IMAGE_NAME:frontend-test-v${{ github.run_number }}
          docker push $IMAGE_NAME:frontend-latest

  # ─────────────────────────────────────────
  # JOB 3: Build & Push Backend Image
  # ─────────────────────────────────────────
  build-backend:
    name: 🐳 Build & Push Backend
    runs-on: ubuntu-latest
    needs: trivy-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Login to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: |
          docker build \
            -t $IMAGE_NAME:backend-test-v${{ github.run_number }} \
            -t $IMAGE_NAME:backend-latest \
            ./devops-bootcamp-linker-backend

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:backend-test-v${{ github.run_number }}
          severity: CRITICAL
          exit-code: 1
          format: table

      - name: Push backend image
        run: |
          docker push $IMAGE_NAME:backend-test-v${{ github.run_number }}
          docker push $IMAGE_NAME:backend-latest

  # ─────────────────────────────────────────
  # JOB 4: Update Manifests & Deploy via ArgoCD
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy via ArgoCD
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GH_PAT }}
          ref: main

      - name: Update frontend image tag in manifest
        run: |
          sed -i "s|image: obianuju127/devopsbootcamp:frontend-test-v.*|image: obianuju127/devopsbootcamp:frontend-test-v${{ github.run_number }}|g" \
            kubernetes/frontend/frontend-deployment.yaml

      - name: Update backend image tag in manifest
        run: |
          sed -i "s|image: obianuju127/devopsbootcamp:backend-test-v.*|image: obianuju127/devopsbootcamp:backend-test-v${{ github.run_number }}|g" \
            kubernetes/backend/backend.yaml

      - name: Commit and push updated manifests
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git remote set-url origin https://obianuju-linda:${{ secrets.GH_PAT }}@github.com/obianuju-linda/DevOps-bootcamp-App-stack.git
          git add kubernetes/frontend/frontend-deployment.yaml kubernetes/backend/backend.yaml
          git commit -m "CI: update image tags to test-v${{ github.run_number }}" || echo "No changes to commit"
          git push origin main

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Sync ArgoCD Apps
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --username ${{ secrets.ARGOCD_USERNAME }} \
            --password ${{ secrets.ARGOCD_PASSWORD }} \
            --insecure
          argocd app sync frontend --force
          argocd app sync backend --force
