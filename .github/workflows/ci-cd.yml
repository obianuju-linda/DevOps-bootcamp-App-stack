name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: obianuju127/devopsbootcamp

jobs:
  trivy-scan:
    name: 🔍 Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan frontend source
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./devops-bootcamp-linker-frontend
          severity: CRITICAL,HIGH
          exit-code: 0
          format: table

      - name: Scan backend source
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./devops-bootcamp-linker-backend
          severity: CRITICAL,HIGH
          exit-code: 0
          format: table
