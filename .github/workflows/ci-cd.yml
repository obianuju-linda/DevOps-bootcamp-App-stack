name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: obianuju127/devopsbootcamp

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Security Scan with Trivy
  # ─────────────────────────────────────────
  trivy-scan:
    name: 🔍 Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan frontend source
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./devops-bootcamp-linker-frontend
          severity: CRITICAL,HIGH
          exit-code: 0
          format: table

      - name: Scan backend source
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./devops-bootcamp-linker-backend
          severity: CRITICAL,HIGH
          exit-code: 0
          format: table

  # ─────────────────────────────────────────
  # JOB 2: Build & Push Frontend Image
  # ─────────────────────────────────────────
  build-frontend:
    name: 🐳 Build & Push Frontend
    runs-on: ubuntu-latest
    needs: trivy-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build frontend image
        run: |
          docker build \
            -t $IMAGE_NAME:frontend-test-v${{ github.run_number }} \
            -t $IMAGE_NAME:frontend-latest \
            ./devops-bootcamp-linker-frontend

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:frontend-test-v${{ github.run_number }}
          severity: CRITICAL
          exit-code: 0
          format: table

      - name: Push frontend image
        run: |
          docker push $IMAGE_NAME:frontend-test-v${{ github.run_number }}
          docker push $IMAGE_NAME:frontend-latest
